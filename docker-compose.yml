services:
  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      DATABASE_URL: postgres://papertrail:papertrail@database:5432/papertrail
      REDIS_URL: redis://redis:6379
    depends_on:
      - database
      - redis
  database:
    build: ./database
    environment:
      POSTGRES_USER: papertrail
      POSTGRES_PASSWORD: papertrail
      POSTGRES_DB: papertrail
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    build: ./redis
volumes:
  pgdata:
